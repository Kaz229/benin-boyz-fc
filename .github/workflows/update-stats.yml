name: Update stats

on:
  schedule:
    - cron: "0 6 * * *"      # tous les jours à 06:00 UTC
  workflow_dispatch: {}        # + lancement manuel depuis l'onglet Actions

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch stats from EA
        env:
          PLATFORM: common-gen5
          CLUB_NAME: "Bénin Boyz FC"
          CLUB_ID: "276969"   # Bénin Boyz FC — figé (la recherche par nom est ambiguë)
        run: node scripts/fetch-stats.mjs

      - name: Commit data.json if changed
        run: |
          git config user.name  "stats-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --staged --quiet; then
            echo "Aucun changement."
          else
            git commit -m "chore: maj stats du club [skip ci]"
            git push
          fi
